# Build performance — these all matter for a multi-module monorepo.
# Without parallel + caching, a full build takes ~3x longer.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.configureondemand=false

# JVM args for the Gradle daemon. 2g is plenty for FinFlow's size.
# Drop to 1g if you're on the 16 GB MBA tier and Docker is taking the rest.
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Kotlin DSL incremental compilation
kotlin.code.style=official
